name: Android Release

# Triggers:
#   1. Push a tag like `android-v1.0.2`  → builds + uploads AAB to Play (internal track)
#   2. Manual run from Actions tab        → same thing, useful for hotfixes
on:
  push:
    tags:
      - "android-v*"
  workflow_dispatch:
    inputs:
      track:
        description: "Play Console track"
        required: true
        default: "internal"
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

jobs:
  build-and-publish:
    name: Build signed AAB and upload to Play Store
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm ci

      - name: Build Next.js (only if your build outputs static assets)
        # Capacitor copies from `www/` (or `out/`); skip if you build on Vercel only.
        # Uncomment if your `capacitor.config.ts` uses webDir of static export.
        # run: npm run build
        run: echo "Skipping web build — app uses remote server.url"

      - name: Capacitor sync
        run: npx cap sync android

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/gritzone-release.keystore

      - name: Write keystore.properties
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > android/keystore.properties <<EOF
          storeFile=gritzone-release.keystore
          storePassword=${STORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF

      - name: Build release AAB
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload AAB artifact (always, even on Play upload failure)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload to Play Console
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: me.gritzone.app
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed
          # Pulls release notes from CHANGELOG-android.md if present
          # whatsNewDirectory: distribution/whatsnew
